<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería Completa | Ascencio Diesel</title>
    <!-- Fuente Industrial -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Iconos FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- CONEXIÓN CON TU ARCHIVO DE ESTILOS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">

    <!-- CABECERA -->
    <header>
        <div class="container">
            <div class="logo">
                <img src="camion.png" alt="Logo Ascencio Diesel" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2312/2312962.png'">
                ASCENCIO <span>DIESEL</span>
            </div>
            <div class="menu-toggle" onclick="toggleMenu()">
                <i class="fas fa-bars"></i>
            </div>
            <nav>
                <ul id="nav-list">
                    <li><a href="index.html"><i class="fas fa-arrow-left"></i> Volver al Inicio</a></li>
                    <li><a href="https://api.whatsapp.com/send?phone=51983448795" target="_blank" style="color: var(--amarillo);">Contacto Rápido</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- GALERÍA DE IMÁGENES -->
    <section class="section" style="padding-top: 3rem;">
        <div class="container" style="max-width: 1400px; width: 95%;">
            
            <div class="section-header-box" style="margin-bottom: 2rem;">
                <h2 class="section-title">Galería de Repuestos</h2>
                <span class="section-subtitle">+15 años de experiencia en el rubro</span>
                <div class="divider"></div>
            </div>

            <!-- BOTÓN DE COTIZACIÓN WHATSAPP NEÓN (Reemplaza a la barra de búsqueda) -->
            <div style="text-align: center;">
                <a href="https://api.whatsapp.com/send?phone=51983448795&text=Hola,%20quiero%20cotizar%20un%20repuesto%20de%20la%20galer%C3%ADa" class="btn-whatsapp-neon" target="_blank">
                    <i class="fab fa-whatsapp"></i> Cotizar Repuesto
                </a>
            </div>

            <!-- MÓSAICO / GALERÍA DE FOTOS -->
            <div id="galeria-grid" class="gallery-mosaic">
                <!-- JavaScript inyectará aquí las fotos de la 1 a la 60 automáticamente -->
            </div>

        </div>
    </section>

    <footer style="margin-top: 0;">
        &copy; 2026 Ascencio Diesel S.A.C. - Todos los derechos reservados.
    </footer>

    <!-- CONEXIÓN CON TU ARCHIVO DE JAVASCRIPT -->
    <script src="script.js"></script>

</body>
